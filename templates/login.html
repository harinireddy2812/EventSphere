{% extends "base.html" %}
{% block title %}Login – EventSphere{% endblock %}
{% block extra_styles %}
<style>
  .auth-wrap { min-height: calc(100vh - 64px); display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; }
  .auth-box h2 { font-size: 1.8rem; margin-bottom: 0.4rem; }
  .auth-box p { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
  .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.88rem; color: var(--muted); }
  .auth-footer a { color: var(--accent); text-decoration: none; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <h2>Welcome back 👋</h2>
    <p>Sign in to manage your bookings.</p>
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="your_username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:0.75rem;">Sign In</button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="/signup">Sign Up</a>
    </div>
    <div class="auth-footer" style="margin-top:0.5rem; font-size:0.8rem;">
      Admin demo: <strong style="color:var(--text);">admin / admin123</strong>
    </div>
  </div>
</div>
{% endblock %}
