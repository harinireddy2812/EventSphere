{% extends "base.html" %}
{% block title %}Sign Up – EventSphere{% endblock %}
{% block extra_styles %}
<style>
  .auth-wrap { min-height: calc(100vh - 64px); display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; }
  .auth-box h2 { font-size: 1.8rem; margin-bottom: 0.4rem; }
  .auth-box p { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
  .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.88rem; color: var(--muted); }
  .auth-footer a { color: var(--accent); text-decoration: none; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <h2>Create Account 🎉</h2>
    <p>Join EventSphere to start booking events.</p>
    <form method="POST">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Harini Reddy" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="harini@email.com" required>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="harini123" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:0.75rem;">Create Account</button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="/login">Sign In</a>
    </div>
  </div>
</div>
{% endblock %}
